apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alerts
  namespace: monitoring
data:
  alerts.yml: |
    groups:
    - name: microservices
      rules:

      # Alert if error rate > 10%
      - alert: HighErrorRate
        expr: |
          rate(http_requests_received_total{code=~"5.."}[5m])
          / rate(http_requests_received_total[5m]) > 0.1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.job }}"
          description: "Error rate is {{ $value | humanizePercentage }}"

      # Alert if pod restarts > 3 in 5 minutes
      - alert: PodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total[5m]) * 60 * 5 > 3
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Pod {{ $labels.pod }} is crash-looping"

      # Alert if API response time p99 > 1s
      - alert: SlowAPIResponse
        expr: |
          histogram_quantile(0.99,
            rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Slow API response on {{ $labels.job }}"
          description: "p99 latency = {{ $value }}s"

      # Alert if pod count drops below 2
      - alert: LowReplicaCount
        expr: kube_deployment_status_replicas_available < 2
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Low replicas for {{ $labels.deployment }}"