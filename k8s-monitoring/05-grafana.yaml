apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      url: http://prometheus:9090
      isDefault: true
      access: proxy
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
    - name: default
      folder: Microservices
      type: file
      options:
        path: /var/lib/grafana/dashboards
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:10.2.0
        ports:
        - containerPort: 3000
        env:
        - { name: GF_SECURITY_ADMIN_USER,     value: admin }
        - { name: GF_SECURITY_ADMIN_PASSWORD, value: admin123 }
        - { name: GF_USERS_ALLOW_SIGN_UP,     value: "false" }
        volumeMounts:
        - { name: datasources, mountPath: /etc/grafana/provisioning/datasources }
        - { name: dashboards,  mountPath: /etc/grafana/provisioning/dashboards  }
        resources:
          requests: { memory: "128Mi", cpu: "100m" }
          limits:   { memory: "256Mi", cpu: "300m" }
      volumes:
      - { name: datasources, configMap: { name: grafana-datasources } }
      - { name: dashboards,  configMap: { name: grafana-dashboards-provider } }
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  selector: { app: grafana }
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP