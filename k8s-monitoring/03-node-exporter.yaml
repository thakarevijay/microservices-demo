apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app: node-exporter
  template:
    metadata:
      labels:
        app: node-exporter
    spec:
      hostNetwork: true
      hostPID: true
      containers:
      - name: node-exporter
        image: prom/node-exporter:v1.7.0
        ports:
        - containerPort: 9100
        args:
        - --path.procfs=/host/proc
        - --path.sysfs=/host/sys
        - --collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($|/)
        securityContext:
          privileged: true
        volumeMounts:
        - { name: proc, mountPath: /host/proc, readOnly: true }
        - { name: sys,  mountPath: /host/sys,  readOnly: true }
        resources:
          requests: { memory: "30Mi",  cpu: "100m" }
          limits:   { memory: "100Mi", cpu: "200m" }
      volumes:
      - { name: proc, hostPath: { path: /proc } }
      - { name: sys,  hostPath: { path: /sys  } }
---
apiVersion: v1
kind: Service
metadata:
  name: node-exporter
  namespace: monitoring
spec:
  selector: { app: node-exporter }
  ports:
  - port: 9100
    targetPort: 9100
  type: ClusterIP