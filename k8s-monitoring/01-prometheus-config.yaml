apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/alerts.yml

    scrape_configs:
      # Scrape .NET APIs directly
      - job_name: 'orders-api'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [microservices]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: orders-api
            action: keep
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: '${1}:8080'

      - job_name: 'products-api'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [microservices]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: products-api
            action: keep
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: '${1}:8080'

      # K8s node metrics (CPU, memory, disk)
      - job_name: 'node-exporter'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [monitoring]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: node-exporter
            action: keep

      # kube-state-metrics (pod restarts, replica counts)
      - job_name: 'kube-state-metrics'
        static_configs:
          - targets: ['kube-state-metrics:8080']

      # Prometheus itself
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']