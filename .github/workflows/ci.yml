name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

env:
  DOTNET_VERSION: '8.0.x'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dotnet:
    name: .NET build & test (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: OrdersApi
            image: orders-api
          - project: ProductsApi
            image: products-api
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ matrix.project }}-${{ hashFiles(format('{0}/**/*.csproj', matrix.project)) }}
          restore-keys: |
            ${{ runner.os }}-nuget-${{ matrix.project }}-
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Format check
        run: dotnet format --verify-no-changes --severity error
        continue-on-error: true  # flip to false once repo is clean

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: >
          dotnet test --no-build -c Release
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults
        continue-on-error: true  # no test project yet; flip to false once you add tests

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.project }}
          path: ${{ matrix.project }}/TestResults/**
          if-no-files-found: warn

  dockerfile-lint:
    name: Hadolint (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [OrdersApi, ProductsApi]
    steps:
      - uses: actions/checkout@v4
      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.project }}/Dockerfile
          failure-threshold: warning

  trivy-config:
    name: Trivy config scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy config scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '0'        # warn-only initially; flip to '1' to block
          ignore-unfixed: true

  terraform:
    name: Terraform fmt & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: terraform fmt
        working-directory: terraform
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: terraform init (no backend)
        working-directory: terraform
        run: terraform init -backend=false

      - name: terraform validate
        working-directory: terraform
        run: terraform validate

  ci-gate:
    name: CI gate
    needs: [dotnet, dockerfile-lint, trivy-config, terraform]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All CI checks passed."