name: CD

on:
  push:
    branches: [main]
    paths:
      - 'OrdersApi/**'
      - 'ProductsApi/**'
      - 'terraform/**'
      - '.github/workflows/cd.yml'
  workflow_dispatch:

env:
  NAMESPACE: microservices
  IMAGE_TAG: ${{ github.sha }}
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  KUBECONFIG: /home/runner/.kube/config
  KUBE_CONFIG_PATH: /home/runner/.kube/config

permissions:
  contents: write
  packages: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false  # never cancel a deploy mid-flight

jobs:
  deploy:
    name: Build + deploy to Civo
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push images to GHCR
        shell: bash
        run: |
          set -euo pipefail
          OWNER_LC="$(echo "${IMAGE_OWNER}" | tr '[:upper:]' '[:lower:]')"
          declare -A PROJECTS=(
            ["orders-api"]="OrdersApi"
            ["products-api"]="ProductsApi"
          )
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          for svc in "${!PROJECTS[@]}"; do
            proj="${PROJECTS[$svc]}"
            image="${REGISTRY}/${OWNER_LC}/${svc}"
            docker build \
              -t "${image}:${IMAGE_TAG}" \
              -t "${image}:latest" \
              --build-arg GIT_COMMIT="${IMAGE_TAG}" \
              --build-arg BUILD_TIME="${BUILD_TIME}" \
              "${proj}"
            docker push "${image}:${IMAGE_TAG}"
            docker push "${image}:latest"
            echo "Pushed ${image}:${IMAGE_TAG}"
          done

      - name: Trivy image scan
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v trivy >/dev/null 2>&1; then
            curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
              | sudo sh -s -- -b /usr/local/bin
          fi
          OWNER_LC="$(echo "${IMAGE_OWNER}" | tr '[:upper:]' '[:lower:]')"
          for svc in orders-api products-api; do
            trivy image \
              --severity HIGH,CRITICAL \
              --ignore-unfixed \
              --exit-code 0 \
              --format table \
              "${REGISTRY}/${OWNER_LC}/${svc}:${IMAGE_TAG}"
          done

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure kubeconfig from secret
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${KUBECONFIG}")"
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > "${KUBECONFIG}"
          chmod 600 "${KUBECONFIG}"
          echo "Cluster context: $(kubectl config current-context)"
          kubectl get nodes
          kubectl version --short || kubectl version

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.5'

      - name: Terraform apply
        working-directory: terraform
        env:
          TF_VAR_image_tag: ${{ env.IMAGE_TAG }}
          TF_IN_AUTOMATION: 'true'
        shell: bash
        run: |
          set -euo pipefail
          terraform init -input=false -reconfigure
          terraform plan -input=false -out=tfplan
          terraform apply -input=false -auto-approve tfplan

      - name: Wait for rollout
        shell: bash
        run: |
          set -euo pipefail
          kubectl -n "${NAMESPACE}" rollout status deployment/orders-deployment   --timeout=240s
          kubectl -n "${NAMESPACE}" rollout status deployment/products-deployment --timeout=240s
          kubectl -n "${NAMESPACE}" get pods -o wide

      - name: Summary
        if: always()
        shell: bash
        run: |
          OWNER_LC="$(echo "${IMAGE_OWNER}" | tr '[:upper:]' '[:lower:]')"
          {
            echo "## Deploy summary"
            echo ""
            echo "- **Commit:** \`${{ github.sha }}\`"
            echo "- **Image tag:** \`${IMAGE_TAG}\`"
            echo "- **Cluster:** Civo (managed k3s)"
            echo "- **Namespace:** \`${NAMESPACE}\`"
            echo "- **Status:** ${{ job.status }}"
            echo ""
            echo "### Pushed images"
            echo "- \`${REGISTRY}/${OWNER_LC}/orders-api:${IMAGE_TAG}\`"
            echo "- \`${REGISTRY}/${OWNER_LC}/products-api:${IMAGE_TAG}\`"
            echo ""
            echo "### Running pods"
            echo '```'
            kubectl -n "${NAMESPACE}" get pods -o wide 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  rollback-on-failure:
    name: Rollback on failure
    needs: deploy
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure kubeconfig from secret
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${KUBECONFIG}")"
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > "${KUBECONFIG}"
          chmod 600 "${KUBECONFIG}"

      - name: kubectl rollout undo
        shell: bash
        run: |
          set -euo pipefail
          for d in orders-deployment products-deployment; do
            kubectl -n "${NAMESPACE}" rollout undo "deployment/$d" || true
            kubectl -n "${NAMESPACE}" rollout status "deployment/$d" --timeout=120s || true
          done