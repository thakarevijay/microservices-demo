name: CD

on:
  push:
    branches: [main]
    paths:
      - 'OrdersApi/**'
      - 'ProductsApi/**'
      - '.github/workflows/cd.yml'
  workflow_dispatch:

env:
  IMAGE_TAG: ${{ github.sha }}
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

permissions:
  contents: write
  packages: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-push-bump:
    name: Build push and bump gitops manifests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images to GHCR
        shell: bash
        run: |
          set -euo pipefail
          OWNER_LC="$(echo "${IMAGE_OWNER}" | tr '[:upper:]' '[:lower:]')"
          declare -A PROJECTS=(
            ["orders-api"]="OrdersApi"
            ["products-api"]="ProductsApi"
          )
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          for svc in "${!PROJECTS[@]}"; do
            proj="${PROJECTS[$svc]}"
            image="${REGISTRY}/${OWNER_LC}/${svc}"
            docker build \
              -t "${image}:${IMAGE_TAG}" \
              -t "${image}:latest" \
              --build-arg GIT_COMMIT="${IMAGE_TAG}" \
              --build-arg BUILD_TIME="${BUILD_TIME}" \
              "${proj}"
            docker push "${image}:${IMAGE_TAG}"
            docker push "${image}:latest"
            echo "Pushed ${image}:${IMAGE_TAG}"
          done

      - name: Trivy image scan
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v trivy >/dev/null 2>&1; then
            curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          fi
          OWNER_LC="$(echo "${IMAGE_OWNER}" | tr '[:upper:]' '[:lower:]')"
          for svc in orders-api products-api; do
            trivy image --severity HIGH,CRITICAL --ignore-unfixed --exit-code 0 --format table "${REGISTRY}/${OWNER_LC}/${svc}:${IMAGE_TAG}"
          done

      - name: Install yq
        shell: bash
        run: |
          if ! command -v yq >/dev/null 2>&1; then
            sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo chmod +x /usr/local/bin/yq
          fi
          yq --version

      - name: Bump image tags in gitops kustomization
        shell: bash
        run: |
          set -euo pipefail
          KUSTOMIZATION="gitops/microservices/base/kustomization.yaml"
          OWNER_LC="$(echo "${IMAGE_OWNER}" | tr '[:upper:]' '[:lower:]')"
          for svc in orders-api products-api; do
            yq -i "(.images[] | select(.name == \"${REGISTRY}/${OWNER_LC}/${svc}\") | .newTag) = \"${IMAGE_TAG}\"" "${KUSTOMIZATION}"
          done
          echo "Updated kustomization:"
          cat "${KUSTOMIZATION}"

      - name: Commit and push gitops update
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet gitops/; then
            echo "No gitops changes - skipping commit"
            exit 0
          fi
          git add gitops/
          SHORT_SHA="${IMAGE_TAG:0:7}"
          git commit -m "ci(gitops): bump image tags to ${SHORT_SHA} [skip ci]"
          git push origin HEAD:main

      - name: Summary
        if: always()
        shell: bash
        run: |
          OWNER_LC="$(echo "${IMAGE_OWNER}" | tr '[:upper:]' '[:lower:]')"
          {
            echo "## CD summary"
            echo ""
            echo "- Commit: ${{ github.sha }}"
            echo "- Image tag: ${IMAGE_TAG}"
            echo "- Status: ${{ job.status }}"
            echo ""
            echo "### Pushed images"
            echo "- ${REGISTRY}/${OWNER_LC}/orders-api:${IMAGE_TAG}"
            echo "- ${REGISTRY}/${OWNER_LC}/products-api:${IMAGE_TAG}"
            echo ""
            echo "ArgoCD will reconcile within 3 minutes."
          } >> "$GITHUB_STEP_SUMMARY"
